<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>庫存查詢</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1976d2">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      max-width: 100vw;
      overflow: hidden;
      background: #1976d2;
      font-family: -apple-system, BlinkMacSystemFont, "Microsoft JhengHei", sans-serif;
      -webkit-text-size-adjust: 100%;
      box-sizing: border-box;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    #appFrame {
      display: block;
      width: 100vw;
      height: 100dvh;
      border: 0;
      background: #fff;
    }

    .loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 15px;
      z-index: 10;
      background: #1976d2;
    }
  </style>
</head>

<body>
  <div class="loading" id="loading">載入中…</div>

  <iframe id="appFrame" title="庫存查詢"></iframe>

  <script>
    var BASE = "https://script.google.com/macros/s/AKfycbw3NJyZIf1HdXFpXMoiXa_O-_E46PkZKjKyMwoHQxeRx5yAgZHI4DJdc1l7YFbjuhQy/exec";
    var q = new URLSearchParams(location.search).get("q") || "";
    var target = q ? (BASE + "?q=" + encodeURIComponent(q)) : BASE;

    var frame = document.getElementById("appFrame");
    var loading = document.getElementById("loading");

    frame.src = target;

    frame.onload = function () {
      loading.style.display = "none";
    };
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").catch(function(error) {
        console.log("Service Worker 註冊失敗", error);
      });
    }
  </script>
</body>
</html>
