<!DOCTYPE html>
<html lang="zh-TW">
<head>

    display: flex;

    justify-content: center;
    font-family: -apple-system, "Microsoft JhengHei", sans-serif;

</style>

<body>

<script>

  location.replace(target);
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
