<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>庫存查詢</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1976d2">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1976d2; }
  iframe { width: 100%; height: 100%; border: none; display: block; }
  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #1976d2; color: #fff; font-family: -apple-system, "Microsoft JhengHei", sans-serif;
    font-size: 14px; opacity: .9; z-index: 10;
  }
</style>
</head>
<body>
<div id="loading">載入中…</div>
<iframe id="app"></iframe>

<script>
  var BASE = "https://script.google.com/macros/s/AKfycbw3NJyZIf1HdXFpXMoiXa_O-_E46PkZKjKyMwoHQxeRx5yAgZHI4DJdc1l7YFbjuhQy/exec";
  var q = new URLSearchParams(location.search).get("q") || "";
  var target = q ? (BASE + "?q=" + encodeURIComponent(q)) : BASE;

  var iframe = document.getElementById("app");
  var loadingEl = document.getElementById("loading");
  var fallbackDone = false;
  var iframeLoaded = false;

  function goFallback() {
    if (fallbackDone) return;
    fallbackDone = true;
    location.replace(target);
  }

  iframe.addEventListener("load", function () {
    iframeLoaded = true;
    if (loadingEl) loadingEl.style.display = "none";
  });

  setTimeout(function () {
    if (!iframeLoaded) goFallback();
  }, 2000);

  iframe.src = target;
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
